name: iOS Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'stable'
    
    - name: Install dependencies
      run: |
        flutter pub get
        flutter doctor -v
    
    - name: Check iOS directory
      run: |
        ls -la ios/
    
    - name: Build iOS
      env:
        FLUTTER_SUPPRESS_ANALYTICS: true
      run: |
        cd ios && pod install && cd ..
        flutter build ios --release --no-codesign
    
    - name: Verify build
      run: |
        ls -la build/ios/iphonesimulator/ 2>/dev/null || ls -la build/ios/iphoneos/ 2>/dev/null || echo "Build not found"
    
    - name: Upload artifacts
      if: success()
      run: |
        find build -name "*.app" -type d | head -1 | xargs -I {} echo "Found: {}"
