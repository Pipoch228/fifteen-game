name: iOS Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'stable'
    
    - name: Debug Flutter
      run: |
        pwd
        which flutter || echo "Flutter not in PATH"
        ls -la $HOME/flutter/bin/ 2>/dev/null || echo "Flutter not installed"
        flutter --version || echo "Flutter command failed"
    
    - name: Get dependencies
      run: flutter pub get || echo "flutter pub get failed"
    
    - name: Check Flutter doctor
      run: flutter doctor || echo "flutter doctor failed"
    
    - name: List available simulators
      run: xcrun simctl list devices available || echo "No simulators"
    
    - name: Build iOS
      run: |
        echo "Starting iOS build..."
        flutter build ios --release --no-codesign 2>&1
        echo "Build command completed"
    
    - name: Check build output
      run: |
        echo "Checking build directory..."
        ls -la build/ios/ 2>/dev/null || echo "No build/ios directory"
        ls -la build/ios/iphonesimulator/ 2>/dev/null || echo "No iphonesimulator"
        ls -la build/ios/iphoneos/ 2>/dev/null || echo "No iphoneos"
