name: iOS Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Flutter
      run: |
        curl -sL https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.27.4-stable.zip -o flutter.zip
        unzip -q flutter.zip
        rm flutter.zip
        export PATH="$PATH:$GITHUB_WORKSPACE/flutter/bin"
        flutter --version
    
    - name: Install dependencies
      run: |
        export PATH="$PATH:$GITHUB_WORKSPACE/flutter/bin"
        flutter pub get
    
    - name: Build iOS
      run: |
        export PATH="$PATH:$GITHUB_WORKSPACE/flutter/bin"
        flutter build ios --release --no-codesign
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: build/ios/iphonesimulator/Runner.app
        retention-days: 7
