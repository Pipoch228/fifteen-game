name: iOS Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Flutter
      run: |
        curl -sL https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.27.4-stable.zip -o flutter.zip
        unzip -q flutter.zip
        rm flutter.zip
    
    - name: Install dependencies
      run: |
        export PATH="$PATH:$GITHUB_WORKSPACE/flutter/bin"
        flutter pub get
    
    - name: Build iOS
      run: |
        export PATH="$PATH:$GITHUB_WORKSPACE/flutter/bin"
        flutter build ios --release --no-codesign
    
    - name: Find and upload artifacts
      run: |
        APP_PATH=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
        echo "Found app at: $APP_PATH"
        ls -la "$APP_PATH" 2>/dev/null || echo "Cannot list app"
